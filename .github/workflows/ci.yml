name: CI Workflow Advance

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: pip install pandas numpy scikit-learn mlflow==2.19.0

    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . --env-manager=local

    - name: Upload Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: ml-model-artifacts
        path: MLProject/mlruns/

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        cd MLProject
        RUN_ID=$(cat run_id.txt)
        
        mlflow models generate-dockerfile -m "runs:/$RUN_ID/model" -d build_dir
        
        sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' build_dir/Dockerfile
        
        docker build -t ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest build_dir/
        docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest