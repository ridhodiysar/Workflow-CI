name: CI Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: pip install pandas numpy scikit-learn

    - name: Train Model
      run: python modelling.py # Pastikan kode ini menyimpan model.pkl

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        # Buat Dockerfile sederhana di sini atau copy dari folder
        docker build -t ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-model:latest